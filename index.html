<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LCS Wrapper</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #f3f6fb;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      .bar {
        padding: 10px 14px;
        font: 600 14px/1.2 sans-serif;
        color: #1e293b;
        background: #e2e8f0;
        border-bottom: 1px solid #cbd5e1;
      }
      iframe {
        flex: 1;
        width: 100%;
        border: 0;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="bar">LCS Report Portal</div>
      <iframe
        src="https://script.google.com/macros/s/AKfycbyoJKplLpc8Nug9mrkX-wWmNHZLLFcIy28biiGWKWLQlGfyEirEYz348gNzM2wZyiMV/exec"
        title="LCS Report Portal"
        loading="lazy"
        allow="clipboard-read; clipboard-write"
        referrerpolicy="strict-origin-when-cross-origin"
      ></iframe>
    </div>
  </body>
</html>
